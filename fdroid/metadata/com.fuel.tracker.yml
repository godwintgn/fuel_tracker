AntiFeatures:
  - NonFreeNet
Categories:
  - Finance Manager
License: GPL-3.0-only
AuthorName: godwintgn
WebSite: https://melmidalamapps.fyi/fueltrack/
SourceCode: https://github.com/godwintgn/fuel_tracker
IssueTracker: https://github.com/godwintgn/fuel_tracker/issues

AutoName: FuelTrack Pro

RepoType: git
Repo: https://github.com/godwintgn/fuel_tracker

Builds:
  - versionName: 1.19.0
    versionCode: 2031
    commit: v1.19.0+31
    subdir: fueltrack_pro
    output: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
    srclibs:
      - flutter@stable
    prebuild:
      - git -C $$flutter$$ checkout -f 3.44.2
      - export PUB_CACHE=$HOME/.pub-cache
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get --enforce-lockfile
    build:
      - export PUB_CACHE=$HOME/.pub-cache
      - $$flutter$$/bin/flutter build apk --release --split-per-abi --target-platform=android-arm64

AutoUpdateMode: Version
UpdateCheckMode: Tags
VercodeOperation:
  - '%c + 2000'
UpdateCheckData: fueltrack_pro/pubspec.yaml|version:\s.+\+(\d+)|.|version:\s(.+)\+
CurrentVersion: 1.19.0
CurrentVersionCode: 2031
