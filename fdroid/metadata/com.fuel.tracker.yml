AutoName: FuelTrack Pro
Summary: Track fuel, efficiency, and vehicle expenses locally

Description: |
  FuelTrack Pro helps you log refuels, track spending, and measure fuel
  efficiency across one or many vehicles — entirely on your device.

  Features include multi-vehicle tracking, analytics, PDF reports, local JSON
  backup, and optional Google Drive sync.

  Full store listing: fastlane/metadata/android/en-US/full_description.txt

RepoType: git
Repo: https://github.com/godwintgn/fuel_tracker

AntiFeatures:
  - NonFreeNet

# Flutter app lives in fueltrack_pro/ (monorepo layout).
Builds:
  - versionName: '1.19.0'
    versionCode: 31
    commit: v1.19.0+31
    subdir: fueltrack_pro
    rm:
      - ios
      - linux
      - macos
      - web
      - windows
    srclibs:
      - flutter@stable
    prebuild:
      - git -C $$flutter$$ checkout -f 3.44.2
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get
    scanignore:
      - .flutter/bin/cache
    scandelete:
      - .flutter
      - .pub-cache
    build:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - OAUTH_ID=$(cat fdroid/oauth_client_id 2>/dev/null || true)
      - if [ -n "$OAUTH_ID" ]; then EXTRA="--dart-define=GOOGLE_OAUTH_SERVER_CLIENT_ID=$OAUTH_ID"; else EXTRA=""; fi
      - $$flutter$$/bin/flutter build apk --release --split-per-abi --target-platform=android-arm64 $EXTRA
    output: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk

AutoUpdateMode: Version
UpdateCheckMode: Tags ^v[\d.]+(\+\d+)?$
CurrentVersion: 1.19.0
CurrentVersionCode: 31
