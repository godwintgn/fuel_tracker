<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>FuelTrack Pro - New Refuel Entry</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wght@8..144,100..1000&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "secondary-fixed-dim": "#a5c8ff",
                    "error": "#ba1a1a",
                    "error-container": "#ffdad6",
                    "on-surface-variant": "#40493d",
                    "outline": "#707a6c",
                    "on-secondary-fixed-variant": "#004786",
                    "on-error-container": "#93000a",
                    "on-error": "#ffffff",
                    "surface-bright": "#fbf9f9",
                    "surface-container-highest": "#e3e2e2",
                    "inverse-surface": "#303031",
                    "on-tertiary-fixed-variant": "#723600",
                    "surface-container-high": "#e9e8e7",
                    "on-tertiary-container": "#ffeee6",
                    "tertiary-fixed-dim": "#ffb786",
                    "surface": "#fbf9f9",
                    "tertiary": "#884200",
                    "tertiary-fixed": "#ffdcc6",
                    "on-surface": "#1b1c1c",
                    "on-primary": "#ffffff",
                    "outline-variant": "#bfcaba",
                    "surface-dim": "#dbdad9",
                    "on-secondary-fixed": "#001c3a",
                    "primary-fixed": "#a3f69c",
                    "on-secondary-container": "#003567",
                    "surface-container": "#efeded",
                    "on-primary-fixed": "#002204",
                    "on-secondary": "#ffffff",
                    "secondary-fixed": "#d4e3ff",
                    "on-background": "#1b1c1c",
                    "surface-tint": "#1b6d24",
                    "inverse-primary": "#88d982",
                    "primary-fixed-dim": "#88d982",
                    "primary": "#0d631b",
                    "surface-container-low": "#f5f3f3",
                    "surface-container-lowest": "#ffffff",
                    "on-tertiary-fixed": "#311300",
                    "secondary": "#005faf",
                    "inverse-on-surface": "#f2f0f0",
                    "on-tertiary": "#ffffff",
                    "surface-variant": "#e3e2e2",
                    "on-primary-fixed-variant": "#005312",
                    "background": "#fbf9f9",
                    "primary-container": "#2e7d32",
                    "secondary-container": "#54a0fe",
                    "on-primary-container": "#cbffc2",
                    "tertiary-container": "#ad5600"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "margin-mobile": "16px",
                    "stack-md": "12px",
                    "stack-lg": "24px",
                    "base": "8px",
                    "margin-tablet": "24px",
                    "gutter": "16px",
                    "stack-sm": "4px",
                    "component-padding-x": "16px",
                    "component-padding-y": "12px"
            },
            "fontFamily": {
                    "body-md": ["Roboto Flex"],
                    "body-lg": ["Roboto Flex"],
                    "headline-md": ["Roboto Flex"],
                    "title-lg": ["Roboto Flex"],
                    "display-lg": ["Roboto Flex"],
                    "label-sm": ["Roboto Flex"],
                    "headline-lg-mobile": ["Roboto Flex"],
                    "label-lg": ["Roboto Flex"],

                    "headline-lg": ["Roboto Flex"]

            "fontSize": {
                    "body-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.25px", "fontWeight": "400"}],
                    "body-lg": ["16px", {"lineHeight": "24px", "letterSpacing": "0.5px", "fontWeight": "400"}],
                    "headline-md": ["28px", {"lineHeight": "36px", "fontWeight": "400"}],
                    "title-lg": ["22px", {"lineHeight": "28px", "fontWeight": "500"}],
                    "display-lg": ["57px", {"lineHeight": "64px", "letterSpacing": "-0.25px", "fontWeight": "400"}],
                    "label-sm": ["11px", {"lineHeight": "16px", "letterSpacing": "0.5px", "fontWeight": "500"}],
                    "headline-lg-mobile": ["28px", {"lineHeight": "34px", "fontWeight": "400"}],
                    "label-lg": ["14px", {"lineHeight": "20px", "letterSpacing": "0.1px", "fontWeight": "500"}],
                    "title-md": ["16px", {"lineHeight": "24px", "letterSpacing": "0.15px", "fontWeight": "500"}],
                    "headline-lg": ["32px", {"lineHeight": "40px", "fontWeight": "400"}]
            }
          },
        },
      }
    </script>
<style>
        body { font-family: 'Roboto Flex', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .form-field-container {
            position: relative;
            background: #efeded;
            border-radius: 16px 16px 0 0;
            border-bottom: 2px solid #707a6c;
            transition: border-bottom-color 0.2s ease;
        }
        .form-field-container:focus-within {
            border-bottom-color: #0d631b;
        }
        input:focus {
            outline: none;
        }
        .auto-calc-pulse {
            animation: soft-pulse 2s infinite ease-in-out;
        }
        @keyframes soft-pulse {
            0% { background-color: rgba(163, 246, 156, 0.2); }
            50% { background-color: rgba(163, 246, 156, 0.4); }
            100% { background-color: rgba(163, 246, 156, 0.2); }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen pb-32">
<!-- Top App Bar -->
<header class="bg-surface dark:bg-surface-dim flex justify-between items-center w-full px-margin-mobile h-16 fixed top-0 z-40">
<div class="flex items-center gap-4">
<button class="active:scale-95 transition-transform hover:bg-surface-container-low p-2 rounded-full">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold text-primary dark:text-primary-fixed">Add Refuel</h1>
</div>
<button class="active:scale-95 transition-transform hover:bg-surface-container-low p-2 rounded-full">
<span class="material-symbols-outlined text-primary">settings</span>
</button>
</header>
<main class="mt-20 px-margin-mobile max-w-2xl mx-auto space-y-6">
<!-- Header Visual Card -->
<div class="relative w-full h-40 rounded-3xl overflow-hidden shadow-sm">
<div class="bg-cover bg-center w-full h-full opacity-90" data-alt="A side view of a metallic silver Mitsubishi Montero Sport parked at a modern, brightly lit fuel station during a clear blue afternoon. The atmosphere is crisp and efficient, using a color palette of clean whites, subtle greys, and vibrant green accents to match a corporate fuel-tracking app's aesthetic." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDc5m-9A4wIelLcvx4pyhYl4BaVt_UMnobJfNCUTkWWmA1cjvXbuMjgFufXmcPJ1u7UHe06Cioh8IGnVXcvhmQeQZUnOZ8LWrHhQwrw8PK4UlAfOp7xO4vEr9xwpyAtkm03Ccs5hYBx8FiO3-lhdRme01rkl3zpPDMf7JZQx5Wbpi1mvMAxsl6bq4UjL0LOL2h2dBjO7il5iywmyuAB_5IomSVGxcCBYIKFExvbTv3wlVfnp8JHOqkYDk9xS3t0ncNx30bvXPkuMg')"></div>
<div class="absolute bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-black/60 to-transparent">
<p class="text-white font-title-md text-title-md">Mitsubishi Montero Sport</p>
<p class="text-white/80 font-label-lg text-label-lg">Diesel • 4WD Luxury</p>
</div>
</div>
<!-- Form Section -->
<form class="space-y-4" id="refuel-form">
<!-- Date and Time -->
<div class="grid grid-cols-2 gap-4">
<div class="form-field-container px-4 py-2">
<label class="block text-primary font-label-sm text-label-sm uppercase tracking-wider">Date</label>
<input class="w-full bg-transparent border-none p-0 text-on-surface font-body-lg text-body-lg" type="date" value="2023-10-27"/>
</div>
<div class="form-field-container px-4 py-2">
<label class="block text-primary font-label-sm text-label-sm uppercase tracking-wider">Time</label>
<input class="w-full bg-transparent border-none p-0 text-on-surface font-body-lg text-body-lg" type="time" value="14:30"/>
</div>
</div>
<!-- Vehicle & Fuel (Read Only Style) -->
<div class="grid grid-cols-2 gap-4">
<div class="form-field-container px-4 py-2 bg-surface-container-low border-outline-variant">
<label class="block text-on-surface-variant font-label-sm text-label-sm uppercase tracking-wider">Vehicle</label>
<div class="text-on-surface font-body-lg text-body-lg flex items-center gap-2">
<span class="material-symbols-outlined text-[20px]">directions_car</span>
                        Montero Sport
                    </div>
</div>
<div class="form-field-container px-4 py-2 bg-surface-container-low border-outline-variant">
<label class="block text-on-surface-variant font-label-sm text-label-sm uppercase tracking-wider">Fuel Type</label>
<div class="text-on-surface font-body-lg text-body-lg flex items-center gap-2">
<span class="material-symbols-outlined text-[20px]">oil_barrel</span>
                        Diesel
                    </div>
</div>
</div>
<!-- Odometer -->
<div class="form-field-container px-4 py-3 flex items-center gap-3">
<span class="material-symbols-outlined text-outline">speed</span>
<div class="flex-grow">
<label class="block text-primary font-label-sm text-label-sm uppercase tracking-wider">Odometer (km)</label>
<input class="w-full bg-transparent border-none p-0 text-on-surface font-title-lg text-title-lg" id="odometer" placeholder="Enter reading" type="number" value="45280"/>
</div>
</div>
<!-- Quantity & Price per Liter -->
<div class="grid grid-cols-2 gap-4">
<div class="form-field-container px-4 py-3 flex items-center gap-3">
<span class="material-symbols-outlined text-outline">local_gas_station</span>
<div class="flex-grow">
<label class="block text-primary font-label-sm text-label-sm uppercase tracking-wider">Quantity (L)</label>
<input class="w-full bg-transparent border-none p-0 text-on-surface font-title-lg text-title-lg" id="quantity" placeholder="0.00" step="0.01" type="number"/>
</div>
</div>
<div class="form-field-container px-4 py-3 flex items-center gap-3">
<span class="material-symbols-outlined text-outline">payments</span>
<div class="flex-grow">
<label class="block text-primary font-label-sm text-label-sm uppercase tracking-wider">Price/L (OMR)</label>
<input class="w-full bg-transparent border-none p-0 text-on-surface font-title-lg text-title-lg" id="price-per-liter" placeholder="0.000" step="0.001" type="number"/>
</div>
</div>
</div>
<!-- Calculated Total Price -->
<div class="form-field-container px-4 py-4 flex items-center justify-between bg-primary-container/10 border-primary rounded-2xl" id="total-price-container">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary">account_balance_wallet</span>
<div>
<label class="block text-primary font-label-sm text-label-sm uppercase tracking-wider">Total Price (OMR)</label>
<div class="font-headline-md text-headline-md font-bold text-primary" id="total-display">0.000</div>
</div>
</div>
<div class="bg-primary/10 px-3 py-1 rounded-full flex items-center gap-1">
<span class="material-symbols-outlined text-[14px] text-primary" style="font-variation-settings: 'FILL' 1;">bolt</span>
<span class="font-label-sm text-label-sm text-primary uppercase">Auto-Calc</span>
</div>
</div>
<!-- Station & Notes -->
<div class="form-field-container px-4 py-3 flex items-center gap-3">
<span class="material-symbols-outlined text-outline">location_on</span>
<div class="flex-grow">
<label class="block text-primary font-label-sm text-label-sm uppercase tracking-wider">Station Name</label>
<input class="w-full bg-transparent border-none p-0 text-on-surface font-body-lg text-body-lg" placeholder="e.g. Shell Al Khuwair" type="text"/>
</div>
</div>
<div class="form-field-container px-4 py-3 flex items-start gap-3">
<span class="material-symbols-outlined text-outline mt-1">notes</span>
<div class="flex-grow">
<label class="block text-primary font-label-sm text-label-sm uppercase tracking-wider">Notes</label>
<textarea class="w-full bg-transparent border-none p-0 text-on-surface font-body-lg text-body-lg resize-none" placeholder="Add additional details..." rows="2"></textarea>
</div>
</div>
</form>
</main>
<!-- Bottom Action Bar -->
<div class="fixed bottom-0 left-0 w-full p-4 bg-surface-container border-t border-outline-variant flex gap-4 items-center z-50">
<button class="flex-1 bg-primary text-on-primary h-14 rounded-full font-title-md text-title-md flex items-center justify-center gap-2 shadow-lg active:scale-95 transition-all hover:bg-primary-container">
<span class="material-symbols-outlined">save</span>
            Save Entry
        </button>
<button class="w-14 h-14 rounded-full bg-secondary-container text-on-secondary-container flex items-center justify-center active:scale-95 transition-transform">
<span class="material-symbols-outlined">receipt_long</span>
</button>
</div>
<!-- Bottom Nav (Shared Component Mockup) -->
<nav class="fixed bottom-0 left-0 w-full z-10 flex justify-around items-center px-base pb-safe h-20 bg-surface-container dark:bg-surface-container-lowest border-t border-outline-variant opacity-0 pointer-events-none transition-opacity duration-300" id="global-nav">
<div class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant px-5 py-1">
<span class="material-symbols-outlined">dashboard</span>
<span class="font-label-lg text-label-lg">Dashboard</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant px-5 py-1">
<span class="material-symbols-outlined">history</span>
<span class="font-label-lg text-label-lg">History</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant px-5 py-1">
<span class="material-symbols-outlined">insights</span>
<span class="font-label-lg text-label-lg">Analytics</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant px-5 py-1">
<span class="material-symbols-outlined">settings</span>
<span class="font-label-lg text-label-lg">Settings</span>
</div>
</nav>
<script>
        const quantityInput = document.getElementById('quantity');
        const pricePerLiterInput = document.getElementById('price-per-liter');
        const totalDisplay = document.getElementById('total-display');
        const totalContainer = document.getElementById('total-price-container');

        function calculateTotal() {
            const quantity = parseFloat(quantityInput.value) || 0;
            const price = parseFloat(pricePerLiterInput.value) || 0;
            const total = (quantity * price).toFixed(3);
            
            totalDisplay.textContent = total;
            
            if (quantity > 0 && price > 0) {
                totalContainer.classList.add('auto-calc-pulse');
            } else {
                totalContainer.classList.remove('auto-calc-pulse');
            }
        }

        quantityInput.addEventListener('input', calculateTotal);
        pricePerLiterInput.addEventListener('input', calculateTotal);

        // Simple tactile interaction for buttons
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', () => {
                // Mock success interaction
                if(btn.innerText.includes('Save')) {
                   btn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> Saving...';
                   setTimeout(() => {
                       btn.innerHTML = '<span class="material-symbols-outlined">check_circle</span> Saved!';
                       btn.classList.replace('bg-primary', 'bg-tertiary');
                   }, 1000);
                }
            });
        });
    </script>
</body></html>
