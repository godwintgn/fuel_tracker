<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>FuelTrack Pro - Add Vehicle</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wght@8..144,100..1000&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "secondary-fixed-dim": "#a5c8ff",
                    "error": "#ba1a1a",
                    "error-container": "#ffdad6",
                    "on-surface-variant": "#40493d",
                    "outline": "#707a6c",
                    "on-secondary-fixed-variant": "#004786",
                    "on-error-container": "#93000a",
                    "on-error": "#ffffff",
                    "surface-bright": "#fbf9f9",
                    "surface-container-highest": "#e3e2e2",
                    "inverse-surface": "#303031",
                    "on-tertiary-fixed-variant": "#723600",
                    "surface-container-high": "#e9e8e7",
                    "on-tertiary-container": "#ffeee6",
                    "tertiary-fixed-dim": "#ffb786",
                    "surface": "#fbf9f9",
                    "tertiary": "#884200",
                    "tertiary-fixed": "#ffdcc6",
                    "on-surface": "#1b1c1c",
                    "on-primary": "#ffffff",
                    "outline-variant": "#bfcaba",
                    "surface-dim": "#dbdad9",
                    "on-secondary-fixed": "#001c3a",
                    "primary-fixed": "#a3f69c",
                    "on-secondary-container": "#003567",
                    "surface-container": "#efeded",
                    "on-primary-fixed": "#002204",
                    "on-secondary": "#ffffff",
                    "secondary-fixed": "#d4e3ff",
                    "on-background": "#1b1c1c",
                    "surface-tint": "#1b6d24",
                    "inverse-primary": "#88d982",
                    "primary-fixed-dim": "#88d982",
                    "primary": "#0d631b",
                    "surface-container-low": "#f5f3f3",
                    "surface-container-lowest": "#ffffff",
                    "on-tertiary-fixed": "#311300",
                    "secondary": "#005faf",
                    "inverse-on-surface": "#f2f0f0",
                    "on-tertiary": "#ffffff",
                    "surface-variant": "#e3e2e2",
                    "on-primary-fixed-variant": "#005312",
                    "background": "#fbf9f9",
                    "primary-container": "#2e7d32",
                    "secondary-container": "#54a0fe",
                    "on-primary-container": "#cbffc2",
                    "tertiary-container": "#ad5600"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "margin-mobile": "16px",
                    "stack-md": "12px",
                    "stack-lg": "24px",
                    "base": "8px",
                    "margin-tablet": "24px",
                    "gutter": "16px",
                    "stack-sm": "4px",
                    "component-padding-x": "16px",
                    "component-padding-y": "12px"
            },
            "fontFamily": {
                    "body-md": ["Roboto Flex"],
                    "body-lg": ["Roboto Flex"],
                    "headline-md": ["Roboto Flex"],
                    "title-lg": ["Roboto Flex"],
                    "display-lg": ["Roboto Flex"],
                    "label-sm": ["Roboto Flex"],
                    "headline-lg-mobile": ["Roboto Flex"],
                    "label-lg": ["Roboto Flex"],
                    "title-md": ["Roboto Flex"],
                    "headline-lg": ["Roboto Flex"]
            },
            "fontSize": {
                    "body-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.25px", "fontWeight": "400"}],
                    "body-lg": ["16px", {"lineHeight": "24px", "letterSpacing": "0.5px", "fontWeight": "400"}],
                    "headline-md": ["28px", {"lineHeight": "36px", "fontWeight": "400"}],
                    "title-lg": ["22px", {"lineHeight": "28px", "fontWeight": "500"}],
                    "display-lg": ["57px", {"lineHeight": "64px", "letterSpacing": "-0.25px", "fontWeight": "400"}],
                    "label-sm": ["11px", {"lineHeight": "16px", "letterSpacing": "0.5px", "fontWeight": "500"}],
                    "headline-lg-mobile": ["28px", {"lineHeight": "34px", "fontWeight": "400"}],
                    "label-lg": ["14px", {"lineHeight": "20px", "letterSpacing": "0.1px", "fontWeight": "500"}],
                    "title-md": ["16px", {"lineHeight": "24px", "letterSpacing": "0.15px", "fontWeight": "500"}],
                    "headline-lg": ["32px", {"lineHeight": "40px", "fontWeight": "400"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .chip-selected {
            background-color: #2e7d32;
            color: #cbffc2;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body-md min-h-screen flex flex-col">
<!-- Top Navigation / Progress -->
<header class="flex justify-between items-center w-full px-margin-mobile h-16 bg-surface">
<button class="p-2 rounded-full hover:bg-surface-container-low transition-colors active:scale-95">
<span class="material-symbols-outlined text-on-surface">arrow_back</span>
</button>
<div class="flex-1 flex justify-center">
<div class="w-1/2 h-1 bg-surface-container-highest rounded-full overflow-hidden">
<div class="w-2/3 h-full bg-primary transition-all duration-500 ease-out"></div>
</div>
</div>
<button class="px-4 py-2 font-label-lg text-label-lg text-primary font-bold hover:bg-surface-container-low rounded-full transition-colors active:scale-95">
            Skip
        </button>
</header>
<main class="flex-1 px-margin-mobile max-w-2xl mx-auto w-full pb-32">
<!-- Headline -->
<section class="mt-stack-lg mb-stack-lg">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-stack-sm">Add your vehicle</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Tell us what you're driving to get more accurate fuel efficiency insights and maintenance alerts.</p>
</section>
<!-- Illustration/Visual Anchor -->
<div class="w-full h-48 rounded-[24px] overflow-hidden mb-stack-lg relative">
<div class="absolute inset-0 bg-gradient-to-tr from-primary/10 to-transparent z-10"></div>
<div class="w-full h-full" data-alt="A clean, high-angle studio shot of a modern car silhouette against a minimal, bright corporate background. The lighting is soft and high-key, emphasizing smooth curves and professional aesthetics. The color palette consists of soft greys, whites, and subtle primary green accents to match the FuelTrack Pro brand identity. The mood is sleek, efficient, and welcoming for a digital onboarding process." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAPg152xsmVipzpnIeOV1QD50GtjNHwxG7kZ0SYojFomY5LAs9J0oJdunJmE3F6tv1UJJlDCx79-zJGVi2jV3ZQrPSHhJAW69yvVSZB3yClrpm2BkO1cho9baC-fwJwtKy_su8i3mwrKvtnwhtVAqaIGhCAbZ1RsroTqAmnCSanl6_0Cr5lH6EqwPBY_DU3AfFGnIXCf-woWqRQpUNqdMmksGrMy9ImJRStJuGhO1qexqJxxZN6lYgBsRddgYjR41Eq0RpY9Midow')"></div>
</div>
<!-- Vehicle Type Selection -->
<section class="mb-stack-lg">
<label class="font-title-md text-title-md text-on-surface mb-stack-md block">Vehicle Type</label>
<div class="flex flex-wrap gap-stack-md">
<!-- Preset Chips -->
<button class="px-5 py-2.5 rounded-full border border-outline-variant font-label-lg text-label-lg text-on-surface-variant hover:bg-surface-container transition-all active:scale-95 flex items-center gap-2" onclick="toggleChip(this)">
<span class="material-symbols-outlined text-[20px]">directions_car</span>
                    Sedan
                </button>
<button class="px-5 py-2.5 rounded-full border border-outline-variant font-label-lg text-label-lg text-on-surface-variant hover:bg-surface-container transition-all active:scale-95 flex items-center gap-2 chip-selected" onclick="toggleChip(this)">
<span class="material-symbols-outlined text-[20px]">csv</span>
                    SUV
                </button>
<button class="px-5 py-2.5 rounded-full border border-outline-variant font-label-lg text-label-lg text-on-surface-variant hover:bg-surface-container transition-all active:scale-95 flex items-center gap-2" onclick="toggleChip(this)">
<span class="material-symbols-outlined text-[20px]">airport_shuttle</span>
                    Van
                </button>
<button class="px-5 py-2.5 rounded-full border border-outline-variant font-label-lg text-label-lg text-on-surface-variant hover:bg-surface-container transition-all active:scale-95 flex items-center gap-2" onclick="toggleChip(this)">
<span class="material-symbols-outlined text-[20px]">electric_car</span>
                    EV
                </button>
<button class="px-5 py-2.5 rounded-full border border-outline-variant font-label-lg text-label-lg text-on-surface-variant hover:bg-surface-container transition-all active:scale-95 flex items-center gap-2" onclick="toggleChip(this)">
<span class="material-symbols-outlined text-[20px]">two_wheeler</span>
                    Bike
                </button>
</div>
</section>
<!-- Manual Entry Fields -->
<section class="space-y-stack-md">
<label class="font-title-md text-title-md text-on-surface block">Vehicle Details</label>
<div class="grid grid-cols-1 md:grid-cols-2 gap-stack-md">
<!-- Manufacturer -->
<div class="relative">
<input class="peer w-full h-14 pt-4 px-4 bg-surface-container-low border-b-2 border-outline-variant focus:border-primary focus:outline-none transition-colors rounded-t-xl font-body-lg text-body-lg" id="make" placeholder=" " type="text"/>
<label class="absolute left-4 top-1 text-on-surface-variant text-[12px] transition-all peer-placeholder-shown:top-4 peer-placeholder-shown:text-body-lg peer-focus:top-1 peer-focus:text-[12px] peer-focus:text-primary" for="make">Manufacturer</label>
</div>
<!-- Model -->
<div class="relative">
<input class="peer w-full h-14 pt-4 px-4 bg-surface-container-low border-b-2 border-outline-variant focus:border-primary focus:outline-none transition-colors rounded-t-xl font-body-lg text-body-lg" id="model" placeholder=" " type="text"/>
<label class="absolute left-4 top-1 text-on-surface-variant text-[12px] transition-all peer-placeholder-shown:top-4 peer-placeholder-shown:text-body-lg peer-focus:top-1 peer-focus:text-[12px] peer-focus:text-primary" for="model">Model</label>
</div>
<!-- Year -->
<div class="relative">
<input class="peer w-full h-14 pt-4 px-4 bg-surface-container-low border-b-2 border-outline-variant focus:border-primary focus:outline-none transition-colors rounded-t-xl font-body-lg text-body-lg" id="year" placeholder=" " type="number"/>
<label class="absolute left-4 top-1 text-on-surface-variant text-[12px] transition-all peer-placeholder-shown:top-4 peer-placeholder-shown:text-body-lg peer-focus:top-1 peer-focus:text-[12px] peer-focus:text-primary" for="year">Year</label>
</div>
<!-- Registration -->
<div class="relative">
<input class="peer w-full h-14 pt-4 px-4 bg-surface-container-low border-b-2 border-outline-variant focus:border-primary focus:outline-none transition-colors rounded-t-xl font-body-lg text-body-lg" id="reg" placeholder=" " type="text"/>
<label class="absolute left-4 top-1 text-on-surface-variant text-[12px] transition-all peer-placeholder-shown:top-4 peer-placeholder-shown:text-body-lg peer-focus:top-1 peer-focus:text-[12px] peer-focus:text-primary" for="reg">Registration Plate</label>
</div>
</div>
<!-- Fuel Type (Horizontal Scroll for Mobile) -->
<div class="pt-stack-md">
<label class="font-label-lg text-label-lg text-on-surface-variant mb-stack-sm block">Fuel Type</label>
<div class="flex gap-stack-sm overflow-x-auto hide-scrollbar pb-2">
<button class="shrink-0 px-4 py-2 rounded-full border border-outline-variant font-label-lg text-label-lg text-on-surface-variant hover:bg-surface-container transition-all" onclick="toggleChip(this)">Petrol</button>
<button class="shrink-0 px-4 py-2 rounded-full border border-outline-variant font-label-lg text-label-lg text-on-surface-variant hover:bg-surface-container transition-all chip-selected" onclick="toggleChip(this)">Diesel</button>
<button class="shrink-0 px-4 py-2 rounded-full border border-outline-variant font-label-lg text-label-lg text-on-surface-variant hover:bg-surface-container transition-all" onclick="toggleChip(this)">Electric</button>
<button class="shrink-0 px-4 py-2 rounded-full border border-outline-variant font-label-lg text-label-lg text-on-surface-variant hover:bg-surface-container transition-all" onclick="toggleChip(this)">Hybrid</button>
<button class="shrink-0 px-4 py-2 rounded-full border border-outline-variant font-label-lg text-label-lg text-on-surface-variant hover:bg-surface-container transition-all" onclick="toggleChip(this)">LPG</button>
</div>
</div>
</section>
</main>
<!-- Bottom Action Bar -->
<footer class="fixed bottom-0 left-0 w-full p-margin-mobile bg-surface-bright/80 backdrop-blur-md">
<div class="max-w-2xl mx-auto">
<button class="w-full h-14 bg-primary text-on-primary font-title-md text-title-md rounded-full shadow-md hover:brightness-110 transition-all active:scale-95 flex items-center justify-center gap-2">
                Next
                <span class="material-symbols-outlined">chevron_right</span>
</button>
</div>
</footer>
<script>
        function toggleChip(element) {
            // Unselect others in the same container if needed, or just toggle
            // For simplicity, we just toggle the selected class here
            const parent = element.parentElement;
            const siblings = parent.querySelectorAll('button');
            siblings.forEach(sib => {
                sib.classList.remove('chip-selected', 'bg-primary', 'text-on-primary');
                sib.classList.add('border-outline-variant', 'text-on-surface-variant');
            });
            
            element.classList.add('chip-selected');
            element.classList.remove('border-outline-variant', 'text-on-surface-variant');
        }

        // Apply visual feedback on input
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('ring-2', 'ring-primary/10');
            });
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('ring-2', 'ring-primary/10');
            });
        });
    </script>
</body></html>
