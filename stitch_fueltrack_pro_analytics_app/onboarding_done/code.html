<!-- Success Confetti Effect (Script) -->
<canvas class="fixed inset-0 pointer-events-none z-50" id="confetti-canvas"></canvas>
<script>
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.x = canvas.width / 2;
                this.y = canvas.height / 2;
                this.size = Math.random() * 6 + 4;
                this.speedX = Math.random() * 10 - 5;
                this.speedY = Math.random() * -15 - 5;
                this.gravity = 0.4;
                this.color = ['#0d631b', '#54a0fe', '#a3f69c', '#d4e3ff'][Math.floor(Math.random() * 4)];
                this.rotation = Math.random() * 360;
                this.rotationSpeed = Math.random() * 10 - 5;
                this.opacity = 1;
            }

            update() {
                this.speedY += this.gravity;
                this.x += this.speedX;
                this.y += this.speedY;
                this.rotation += this.rotationSpeed;
                this.opacity -= 0.01;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation * Math.PI / 180);
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = this.color;
                ctx.fillRect(-this.size / 2, -this.size / 2, this.size, this.size);
                ctx.restore();
            }
        }

        function createConfetti() {
            for (let i = 0; i < 100; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].opacity <= 0) {
                    particles.splice(i, 1);
                    i--;
                }
            }
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resize);
        resize();
        
        // Trigger celebration on load
        setTimeout(() => {
            createConfetti();
            animate();
        }, 300);

        // Subtle micro-re-trigger on button hover
        document.querySelector('button').addEventListener('mouseenter', () => {
            if(particles.length < 20) createConfetti();
        });
    </script>
