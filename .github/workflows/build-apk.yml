name: Build APK

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_name: ${{ steps.version.outputs.version_name }}
      version_code: ${{ steps.version.outputs.version_code }}
      tag: ${{ steps.version.outputs.tag }}
    defaults:
      run:
        working-directory: fueltrack_pro
    env:
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        working-directory: fueltrack_pro
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | tr -d ' ')
          VERSION_NAME="${VERSION%%+*}"
          VERSION_CODE="${VERSION#*+}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Decode keystore
        if: env.KEYSTORE_BASE64 != ''
        run: echo "$KEYSTORE_BASE64" | base64 --decode > android/app/melmidalam-release.jks

      - name: Create key.properties
        if: env.KEYSTORE_BASE64 != ''
        run: |
          cat > android/key.properties <<EOF
          storeFile=app/melmidalam-release.jks
          keyAlias=${{ secrets.KEY_ALIAS }}
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: fueltrack-pro-release-apk
          path: fueltrack_pro/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

  release:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: fueltrack-pro-release-apk

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.build.outputs.tag }}
          VERSION: ${{ needs.build.outputs.version }}
          VERSION_NAME: ${{ needs.build.outputs.version_name }}
        run: |
          cp app-release.apk FuelTrack-Pro.apk
          cp app-release.apk "FuelTrack-Pro-v${VERSION}.apk"
          NOTES="FuelTrack Pro ${VERSION}

          - Signed release APK for Android
          - Install via Obtainium: https://apps.obtainium.imranr.dev/redirect?r=obtainium://add/https://github.com/godwintgn/fuel_tracker
          - Direct download: https://github.com/godwintgn/fuel_tracker/releases/download/${TAG}/FuelTrack-Pro.apk"
          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release upload "$TAG" --repo "${{ github.repository }}" FuelTrack-Pro.apk "FuelTrack-Pro-v${VERSION}.apk" --clobber
          else
            gh release create "$TAG" --repo "${{ github.repository }}" \
              --title "FuelTrack Pro v${VERSION_NAME}" \
              --notes "$NOTES" \
              FuelTrack-Pro.apk "FuelTrack-Pro-v${VERSION}.apk"
          fi

  sync-website:
    needs: [build, release]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fuel_tracker
        uses: actions/checkout@v4

      - name: Update release.json
        env:
          VERSION: ${{ needs.build.outputs.version }}
          VERSION_NAME: ${{ needs.build.outputs.version_name }}
          VERSION_CODE: ${{ needs.build.outputs.version_code }}
          TAG: ${{ needs.build.outputs.tag }}
        run: |
          RELEASED_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          APK_URL="https://github.com/godwintgn/fuel_tracker/releases/download/${TAG}/FuelTrack-Pro.apk"
          cat > website/public/fueltrack/release.json <<EOF
          {
            "appName": "FuelTrack Pro",
            "version": "${VERSION}",
            "versionName": "${VERSION_NAME}",
            "versionCode": ${VERSION_CODE},
            "releasedAt": "${RELEASED_AT}",
            "apkUrl": "${APK_URL}",
            "releasePageUrl": "https://github.com/godwintgn/fuel_tracker/releases/latest",
            "obtainiumUrl": "https://apps.obtainium.imranr.dev/redirect?r=obtainium://add/https://github.com/godwintgn/fuel_tracker",
            "packageId": "com.fuel.tracker"
          }
          EOF

      - name: Sync to wealth-journal website
        env:
          WEBSITE_REPO_TOKEN: ${{ secrets.WEBSITE_REPO_TOKEN }}
        run: |
          if [ -z "$WEBSITE_REPO_TOKEN" ]; then
            echo "WEBSITE_REPO_TOKEN not set — skipping website sync"
            exit 0
          fi
          git clone --depth 1 "https://x-access-token:${WEBSITE_REPO_TOKEN}@github.com/godwintgn/wealth-journal.git" /tmp/wealth-journal
          rsync -av --delete website/public/fueltrack/ /tmp/wealth-journal/website/public/fueltrack/
          rsync -av --delete website/public/assets/screenshots/fueltrack/ /tmp/wealth-journal/website/public/assets/screenshots/fueltrack/
          cp website/public/assets/fueltrack-download.js /tmp/wealth-journal/website/public/assets/fueltrack-download.js
          cd /tmp/wealth-journal
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add website/public/fueltrack website/public/assets/fueltrack-download.js website/public/assets/screenshots/fueltrack
          if git diff --staged --quiet; then
            echo "No website changes to sync"
            exit 0
          fi
          git commit --trailer "Co-authored-by: Cursor <cursoragent@cursor.com>" -m "chore(site): sync FuelTrack Pro ${VERSION} release metadata"
          git push origin main

