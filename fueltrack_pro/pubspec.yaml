name: fueltrack_pro
description: FuelTrack Pro — vehicle fuel consumption, expenses, and efficiency analytics.
publish_to: 'none'
version: 1.12.0+20

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  sqflite: ^2.4.2
  path: ^1.9.1
  path_provider: ^2.1.5
  google_fonts: ^6.2.1
  fl_chart: ^0.70.2
  intl: ^0.20.2
  google_sign_in: ^6.2.2
  googleapis: ^13.2.0
  extension_google_sign_in_as_googleapis_auth: ^2.0.12
  cryptography: ^2.9.0
  shared_preferences: ^2.3.3
  uuid: ^4.5.1
  file_picker: ^8.1.7
  http: ^1.2.2
  image_picker: ^1.1.2
  crop_your_image: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/icon/app_icon.png
  adaptive_icon_background: "#0D631B"
  adaptive_icon_foreground: assets/icon/app_icon.png

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
